site_name: RemoteX
site_description: A visual command launcher for Linux — run local and SSH commands with one click.
site_url: https://neurocontrarian.github.io/remotex
repo_url: https://github.com/neurocontrarian/remotex
repo_name: neurocontrarian/remotex

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: fr
          name: Français
          build: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quick-start.md
  - Reference:
    - Main Window: reference/main-window.md
    - Button Editor: reference/button-editor.md
    - Preferences: reference/preferences.md
    - SSH Machines: reference/ssh-machines.md
  - Use Cases:
    - Home Server Management: use-cases/home-server.md
    - Development Workflow: use-cases/dev-workflow.md
    - Beginner Guide: use-cases/beginner.md
  - Pro Features:
    - Overview: pro.md
    - SSH & Multi-machine: pro/ssh.md
    - Multi-select: pro/multiselect.md
    - Themes: pro/themes.md
    - Backup & Restore: pro/backup.md
    - License & Devices: pro/license-devices.md
  - AI Integration (MCP): mcp.md
  - Legal:
    - Terms of Service: legal/terms.md
    - Privacy Policy: legal/privacy.md
    - Refund Policy: legal/refund.md

markdown_extensions:
  - attr_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/neurocontrarian/remotex

copyright: >-
  Copyright &copy; 2026 neurocontrarian &mdash;
  <a href="/remotex/legal/terms/">Terms</a> &middot;
  <a href="/remotex/legal/privacy/">Privacy</a> &middot;
  <a href="/remotex/legal/refund/">Refunds</a>
